<svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 50 50">
  <defs>
    <pattern id="mudcloth" patternUnits="userSpaceOnUse" width="50" height="50">
      <!-- Horizontal lines -->
      <line x1="0" y1="10" x2="50" y2="10" stroke="#4A8D77" stroke-width="1" stroke-opacity="0.05"/>
      <line x1="0" y1="25" x2="50" y2="25" stroke="#4A8D77" stroke-width="1" stroke-opacity="0.04"/>
      <line x1="0" y1="40" x2="50" y2="40" stroke="#4A8D77" stroke-width="1" stroke-opacity="0.05"/>
      <!-- Dots -->
      <circle cx="12" cy="17" r="2" fill="#4A8D77" fill-opacity="0.05"/>
      <circle cx="37" cy="17" r="2" fill="#4A8D77" fill-opacity="0.05"/>
      <circle cx="25" cy="32" r="2" fill="#4A8D77" fill-opacity="0.04"/>
      <circle cx="12" cy="47" r="2" fill="#4A8D77" fill-opacity="0.05"/>
      <circle cx="37" cy="47" r="2" fill="#4A8D77" fill-opacity="0.05"/>
      <!-- Short vertical marks -->
      <line x1="5" y1="5" x2="5" y2="15" stroke="#4A8D77" stroke-width="1" stroke-opacity="0.04"/>
      <line x1="45" y1="5" x2="45" y2="15" stroke="#4A8D77" stroke-width="1" stroke-opacity="0.04"/>
      <line x1="25" y1="35" x2="25" y2="45" stroke="#4A8D77" stroke-width="1" stroke-opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#mudcloth)"/>
</svg>