<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <defs>
    <pattern id="ndebele" patternUnits="userSpaceOnUse" width="80" height="80">
      <!-- Outer frame -->
      <rect x="5" y="5" width="70" height="70" fill="none" stroke="#4A8D77" stroke-width="2" stroke-opacity="0.06"/>
      <!-- Inner frame -->
      <rect x="15" y="15" width="50" height="50" fill="none" stroke="#4A8D77" stroke-width="2" stroke-opacity="0.05"/>
      <!-- Center diamond -->
      <polygon points="40,20 60,40 40,60 20,40" fill="none" stroke="#4A8D77" stroke-width="1.5" stroke-opacity="0.04"/>
      <!-- Corner accents -->
      <rect x="10" y="10" width="8" height="8" fill="#4A8D77" fill-opacity="0.04"/>
      <rect x="62" y="10" width="8" height="8" fill="#4A8D77" fill-opacity="0.04"/>
      <rect x="10" y="62" width="8" height="8" fill="#4A8D77" fill-opacity="0.04"/>
      <rect x="62" y="62" width="8" height="8" fill="#4A8D77" fill-opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#ndebele)"/>
</svg>