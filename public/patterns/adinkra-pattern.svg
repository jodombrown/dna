<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60">
  <defs>
    <pattern id="adinkra" patternUnits="userSpaceOnUse" width="60" height="60">
      <!-- Sankofa-inspired spiral (learning from past) -->
      <path d="M15,15 Q20,10 25,15 Q30,20 25,25 Q20,30 15,25 Q10,20 15,15" 
            fill="none" stroke="#4A8D77" stroke-width="1.5" stroke-opacity="0.05"/>
      <!-- Gye Nyame-inspired shape (supremacy of God) -->
      <path d="M45,15 L50,20 L45,25 L40,20 Z" 
            fill="#4A8D77" fill-opacity="0.04"/>
      <!-- Dwennimmen-inspired ram's horns (humility with strength) -->
      <path d="M10,45 Q15,40 20,45 M20,45 Q15,50 10,45" 
            fill="none" stroke="#4A8D77" stroke-width="1" stroke-opacity="0.05"/>
      <!-- Nyame Dua-inspired tree (God's presence) -->
      <line x1="45" y1="40" x2="45" y2="55" stroke="#4A8D77" stroke-width="1.5" stroke-opacity="0.04"/>
      <line x1="40" y1="45" x2="50" y2="45" stroke="#4A8D77" stroke-width="1" stroke-opacity="0.04"/>
      <!-- Small accent dots -->
      <circle cx="30" cy="30" r="2" fill="#4A8D77" fill-opacity="0.04"/>
      <circle cx="5" cy="5" r="1.5" fill="#4A8D77" fill-opacity="0.03"/>
      <circle cx="55" cy="5" r="1.5" fill="#4A8D77" fill-opacity="0.03"/>
      <circle cx="5" cy="55" r="1.5" fill="#4A8D77" fill-opacity="0.03"/>
      <circle cx="55" cy="55" r="1.5" fill="#4A8D77" fill-opacity="0.03"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#adinkra)"/>
</svg>
